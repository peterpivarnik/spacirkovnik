<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacírkovník – Nová stránka sa pripravuje</title>
    <meta name="description" content="Rodinné prechádzky, ktoré sa hrajú ako dobrodružstvo. Nová stránka sa pripravuje.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F0E9DF;
            color: #3D2314;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .banner {
            width: 100%;
            max-width: 560px;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(61,35,20,0.15);
            margin-bottom: 2rem;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: #A0785A;
            border-radius: 2px;
            margin: 0 auto 2rem;
        }

        .message {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3D2314;
            margin-bottom: 0.75rem;
        }

        .submessage {
            font-size: 1rem;
            color: #6B4C35;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .contact {
            font-size: 0.9rem;
            color: #8A6650;
        }

        .contact a {
            color: #3D2314;
            text-decoration: none;
            font-weight: 600;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .message { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="container">

        <img class="banner" src="banner.png" alt="Špacírkovník – Sleduj mapu, lúšti hádanky, objavuj mesto!">

        <div class="divider"></div>

        <div class="message">Nová stránka sa pripravuje</div>
        <p class="submessage">
            Pracujeme na novom webe. Čoskoro tu nájdeš všetko<br>
            o hrách, trasách a dobrodružstvách!
        </p>

        <div class="contact">
            Otázky? Napíš nám na
            <a href="mailto:info@spacirkovnik.sk">info@spacirkovnik.sk</a>
        </div>

    </div>
</body>
</html>
